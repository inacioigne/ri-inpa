networks:
  dspacenet:
    ipam:
      config:
        - subnet: 172.23.0.0/16

services:
  api:
    container_name: api
    env_file:
      - .env
    environment:
      dspace__P__dir: /dspace
      dspace__P__name: 'RI INPA'
      dspace__P__server__P__url: 'https://repositorio.inpa.gov.br/server'
      db__P__url: 'jdbc:postgresql://dspacedb:5432/dspace'
      solr__P__server: http://dspacesolr:8983/solr
      proxies__P__trusted__P__ipranges: '172.23.0'
      LOGGING_CONFIG: /dspace/config/log4j2-container.xml
      TZ: America/Manaus
    image: "docker.io/inpa/api:${DSPACE_VERSION}"

    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        DSPACE_VERSION: ${DSPACE_VERSION}
    
    depends_on:
      dspacedb:
        condition: service_healthy
      dspacesolr:
        condition: service_healthy
    networks:
      - dspacenet
    ports:
      - "8080:8080"
    volumes:
      - assetstore:/dspace/assetstore
      - ./api/dspace/config:/dspace/config:ro
    entrypoint:
      - /bin/bash
      - '-c'
      - |
        while (!</dev/tcp/dspacedb/5432) > /dev/null 2>&1; do sleep 1; done;
        /dspace/bin/dspace database migrate
        java -jar /dspace/webapps/server-boot.jar --dspace.dir=/dspace
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/server/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  dspacedb:
    container_name: dspacedb
    env_file:
      - .env
    image: "docker.io/postgres:${POSTGRES_VERSION:-15}"
    environment:
      PGDATA: /pgdata
      POSTGRES_DB: dspace
      POSTGRES_USER: dspace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Manaus
    networks:
      dspacenet:
    ports:
    - published: 5432
      target: 5432
    stdin_open: true
    tty: true
    volumes:
      - pgdata:/pgdata
    healthcheck:
     test: ["CMD-SHELL", "pg_isready -U dspace -d dspace -h localhost"]
     interval: 10s
     timeout: 5s
     retries: 5
    restart: unless-stopped

  dspacesolr:
    container_name: dspacesolr
    env_file:
      - .env
    build:
      context: ./api/dspace/src/main/docker/dspace-solr/
      additional_contexts:
        solrconfigs: ./api/dspace/solr/
      args:
        SOLR_VERSION: "${SOLR_VER:-9.8}"
    image: "inpa/dspace-solr:${DSPACE_VERSION}"
    environment:
      TZ: America/Manaus
    networks:
      - dspacenet
    ports:
      - "8983:8983"
    working_dir: /var/solr/data
    user: root
    volumes:
      - solr_data:/var/solr/data
    entrypoint:
      - /bin/bash
      - '-c'
      - |
        init-var-solr
        precreate-core authority /opt/solr/server/solr/configsets/authority
        cp -r /opt/solr/server/solr/configsets/authority/* authority
        precreate-core oai /opt/solr/server/solr/configsets/oai
        cp -r /opt/solr/server/solr/configsets/oai/* oai
        precreate-core search /opt/solr/server/solr/configsets/search
        cp -r /opt/solr/server/solr/configsets/search/* search
        precreate-core statistics /opt/solr/server/solr/configsets/statistics
        cp -r /opt/solr/server/solr/configsets/statistics/* statistics
        precreate-core qaevent /opt/solr/server/solr/configsets/qaevent
        cp -r /opt/solr/server/solr/configsets/qaevent/* qaevent
        precreate-core suggestion /opt/solr/server/solr/configsets/suggestion
        cp -r /opt/solr/server/solr/configsets/suggestion/* suggestion
        chown -R solr:solr /var/solr
        runuser -u solr -- solr-foreground
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8983/solr || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
  
  ui:
    container_name: ui
    environment:
      DSPACE_UI_SSL: 'false'
      DSPACE_UI_HOST: ui
      DSPACE_UI_PORT: '4000'
      DSPACE_UI_NAMESPACE: /
      DSPACE_REST_SSL: 'true'
      DSPACE_REST_HOST: ri.inpa.gov.br
      DSPACE_REST_PORT: 443
      # DSPACE_REST_SSL: 'false'
      # DSPACE_REST_HOST: localhost
      # DSPACE_REST_PORT: 8080
      DSPACE_REST_NAMESPACE: /server
      TZ: America/Manaus
    image: "inpa/angular:${DSPACE_VERSION}"
    build:
      context: ./ui
      dockerfile: Dockerfile.dist
      # dockerfile: Dockerfile
    networks:
      dspacenet:
    ports:
    - published: 4000
      target: 4000
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  assetstore:
  pgdata:
  solr_data:
